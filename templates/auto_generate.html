<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自動化投票議題生成</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .feature-item {
            padding: 15px;
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border-radius: 10px;
            text-align: center;
        }

        .feature-item .icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .feature-item .text {
            color: #555;
            font-size: 14px;
        }

        .config-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .config-section h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .progress-section {
            margin-top: 30px;
            display: none;
        }

        .progress-section.active {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        .status-message {
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: 500;
        }

        .status-message.running {
            background: #fff3cd;
            color: #856404;
        }

        .status-message.success {
            background: #d4edda;
            color: #155724;
        }

        .status-message.error {
            background: #f8d7da;
            color: #721c24;
        }

        .results-section {
            margin-top: 30px;
            display: none;
        }

        .results-section.active {
            display: block;
        }

        .results-section h3 {
            margin-bottom: 20px;
            color: #333;
        }

        .topic-card {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .topic-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .topic-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }

        .topic-title {
            font-size: 18px;
            font-weight: 600;
            color: #667eea;
        }

        .topic-badges {
            display: flex;
            gap: 10px;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge.controversy {
            background: #ff6b6b;
            color: white;
        }

        .badge.hotness {
            background: #ffd93d;
            color: #333;
        }

        .topic-question {
            color: #333;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .topic-category {
            color: #666;
            font-size: 14px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-secondary {
            background: #6c757d;
            flex: 1;
        }

        .btn-success {
            background: #28a745;
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 自動化投票議題生成</h1>
        <p class="subtitle">一鍵完成：新聞抓取 → AI 分析 → 圖片生成</p>

        <div class="features">
            <div class="feature-item">
                <div class="icon">📰</div>
                <div class="text">自動抓取最新新聞</div>
            </div>
            <div class="feature-item">
                <div class="icon">🤖</div>
                <div class="text">AI 分析生成議題</div>
            </div>
            <div class="feature-item">
                <div class="icon">🎨</div>
                <div class="text">NVIDIA 生成圖片</div>
            </div>
            <div class="feature-item">
                <div class="icon">⚡</div>
                <div class="text">一鍵完成流程</div>
            </div>
        </div>

        <div class="config-section">
            <h3>⚙️ 配置選項</h3>
            
            <div class="form-group">
                <label for="keywords">關鍵詞（用逗號分隔）：</label>
                <input type="text" id="keywords" value="中美, 特朗普, 科技, 經濟" 
                       placeholder="例如：中美, 特朗普, 科技">
            </div>

            <div class="form-group">
                <label for="maxTopics">生成議題數量：</label>
                <input type="number" id="maxTopics" value="5" min="1" max="10">
            </div>

            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="useNvidia" checked>
                    <label for="useNvidia" style="margin: 0;">使用 NVIDIA AI 生成圖片（推薦）</label>
                </div>
            </div>
        </div>

        <button onclick="startAutomation()" id="startBtn">
            🚀 開始自動化生成
        </button>

        <div class="progress-section" id="progressSection">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%">0%</div>
            </div>
            <div class="status-message running" id="statusMessage">
                正在初始化...
            </div>
        </div>

        <div class="results-section" id="resultsSection">
            <h3>✅ 生成結果</h3>
            <div id="topicsList"></div>
            
            <div class="action-buttons">
                <button class="btn-secondary" onclick="location.reload()">
                    🔄 重新生成
                </button>
                <button class="btn-success" onclick="window.location.href='/nvidia-gen'">
                    🖼️ 查看圖片
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000';
        let statusCheckInterval = null;

        async function startAutomation() {
            const keywords = document.getElementById('keywords').value.split(',').map(k => k.trim());
            const maxTopics = parseInt(document.getElementById('maxTopics').value);
            const useNvidia = document.getElementById('useNvidia').checked;
            const btn = document.getElementById('startBtn');

            // 禁用按鈕
            btn.disabled = true;
            
            // 顯示進度區域
            document.getElementById('progressSection').classList.add('active');
            
            // 發送請求
            try {
                const response = await fetch(`${API_BASE}/api/auto-generate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        keywords: keywords,
                        max_topics: maxTopics,
                        use_nvidia: useNvidia
                    })
                });

                const data = await response.json();

                if (data.success) {
                    // 開始輪詢狀態
                    startStatusPolling();
                } else {
                    throw new Error(data.error || '啟動失敗');
                }
            } catch (error) {
                showStatus(`❌ 錯誤：${error.message}`, 'error');
                btn.disabled = false;
            }
        }

        function startStatusPolling() {
            statusCheckInterval = setInterval(checkStatus, 1000);
        }

        async function checkStatus() {
            try {
                const response = await fetch(`${API_BASE}/api/automation-status`);
                const status = await response.json();

                // 更新進度條
                updateProgress(status.progress, status.message);

                // 檢查是否完成
                if (!status.running && status.progress > 0) {
                    clearInterval(statusCheckInterval);
                    
                    if (status.result) {
                        showResults(status.result);
                    } else {
                        showStatus(status.message, 'error');
                        document.getElementById('startBtn').disabled = false;
                    }
                }
            } catch (error) {
                console.error('檢查狀態失敗:', error);
            }
        }

        function updateProgress(progress, message) {
            const fill = document.getElementById('progressFill');
            fill.style.width = `${progress}%`;
            fill.textContent = `${progress}%`;
            
            showStatus(message, 'running');
        }

        function showStatus(message, type) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = `status-message ${type}`;
        }

        function showResults(result) {
            showStatus('✅ 自動化流程完成！', 'success');
            
            const resultsSection = document.getElementById('resultsSection');
            resultsSection.classList.add('active');
            
            const topicsList = document.getElementById('topicsList');
            topicsList.innerHTML = '';
            
            result.topics.forEach(topic => {
                const card = document.createElement('div');
                card.className = 'topic-card';
                
                card.innerHTML = `
                    <div class="topic-header">
                        <div class="topic-title">${topic.title}</div>
                        <div class="topic-badges">
                            <span class="badge controversy">爭議度: ${topic.controversy}</span>
                            <span class="badge hotness">熱度: ${topic.hotness}</span>
                        </div>
                    </div>
                    <div class="topic-question">${topic.question}</div>
                    <div class="topic-category">分類: ${topic.category}</div>
                `;
                
                topicsList.appendChild(card);
            });
            
            // 隱藏進度條
            setTimeout(() => {
                document.getElementById('progressSection').style.display = 'none';
            }, 2000);
        }
    </script>
</body>
</html>
